# Production-ready multi-service orchestration
#
# Usage:
#   docker compose up -d          Start all services
#   docker compose up backend     Start backend only
#   docker compose logs -f        Follow logs
#   docker compose down           Stop all services
# ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ

services:
  # ?ïżœ?ïżœ Backend API ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ogenti-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=file:/app/data/aimaster.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set (32+ chars)}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      - STRIPE_CONNECT_CLIENT_ID=${STRIPE_CONNECT_CLIENT_ID:-}
      - AGENT_RUNTIME_URL=http://agent-runtime:8000
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
      - LOG_LEVEL=info
    volumes:
      - backend-data:/app/data
    depends_on:
      - agent-runtime
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ogenti

  # ?ïżœ?ïżœ Frontend (Next.js) ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ogenti-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ogenti

  # ?ïżœ?ïżœ Agent Runtime (Python) ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ
  agent-runtime:
    build:
      context: .
      dockerfile: agent-runtime/Dockerfile
    container_name: ogenti-runtime
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - RUNTIME_PORT=8000
      - BACKEND_URL=http://backend:4000
      - AGENT_RUNTIME_SECRET=${AGENT_RUNTIME_SECRET:?AGENT_RUNTIME_SECRET must be set}
      - CORS_ORIGINS=http://localhost:3000,http://backend:4000
      - LOG_LEVEL=info
      - HEADLESS=true
    volumes:
      - runtime-data:/app/data
      # X11 socket for non-headless mode (Linux host only, not Docker Desktop).
      # Comment out on macOS/Windows or when HEADLESS=true.
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ogenti

  # ?ïżœ?ïżœ Redis (optional, for rate limiting & caching) ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ?ïżœ
  # Currently unused by backend â uncomment when Redis integration is added.
  # redis:
  #   image: redis:7-alpine
  #   container_name: ogenti-redis
  #   restart: unless-stopped
  #   ports:
  #     - '6379:6379'
  #   volumes:
  #     - redis-data:/data
  #   command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
  #   healthcheck:
  #     - test: ['CMD', 'redis-cli', 'ping']
  #     - interval: 10s
  #     - timeout: 5s
  #     - retries: 5
  #   networks:
  #     - ogenti

volumes:
  backend-data:
    driver: local
  runtime-data:
    driver: local
  # redis-data:
  #   driver: local

networks:
  ogenti:
    driver: bridge
